<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My E-Commerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body style="min-width: 320px">
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="../index.html">My E-Commerce</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="../index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./edit.html"
                  >Edit Products</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main
      class="container-fluid d-flex flex-column align-items-center justify-content-between"
    >
      <section
        id="addProductSection"
        class="col-12 col-md-6 m-5"
        style="max-width: 500px"
      >
        <h3>Add a product:</h3>
        <form id="productRegistrationForm">
          <div class="mb-3">
            <label for="productName" class="form-label">Product Name</label>
            <input type="text" class="form-control" id="productName" />
          </div>

          <div class="mb-3">
            <label for="productBrand" class="form-label">Brand</label>
            <input type="text" class="form-control" id="productBrand" />
          </div>

          <div class="mb-3">
            <label for="productDescription" class="form-label"
              >Description</label
            >
            <input type="text" class="form-control" id="productDescription" />
          </div>

          <div class="mb-3">
            <label for="productImage" class="form-label">Image Url</label>
            <input type="text" class="form-control" id="productImage" />
          </div>

          <div class="mb-3">
            <label for="productPrice" class="form-label">Price</label>
            <input type="text" class="form-control" id="productPrice" />
          </div>

          <button type="submit" class="btn btn-success">Submit</button>
          <button type="button" id="clearInput" class="btn btn-danger">
            Clear Input
          </button>
        </form>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="/scripts/api.js"></script>
    <script src="/scripts/add.js"></script>
  </body>
</html>
